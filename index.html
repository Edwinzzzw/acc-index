    <!--
      SPA 路由：直接访问 /acc-index/leaderboard 时，GitHub Pages 找不到这个路径会返回 404.html。
      404.html 里有一段脚本会把当前 path 编码到 query string 上重定向回根。
      下面这段脚本在根页面加载时把 query string 解出来 push 回 history。
      参考 https://github.com/rafgraph/spa-github-pages
    -->
    <script>
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
