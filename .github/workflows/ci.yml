name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: 类型检查
        run: npm run lint
      - name: 数据校验
        run: npm run validate-data
      - name: 单元测试
        run: npm test
      - name: 生产构建
        run: npm run build
      - name: 安装 Playwright 浏览器
        run: npx playwright install --with-deps chromium
      - name: E2E 测试
        run: npm run test:e2e
