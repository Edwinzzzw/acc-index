<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>ACC 指数</title>
    <!--
      GitHub Pages 收到任何 /acc-index/<未知路径> 请求都会返回这个 404.html。
      下面的脚本把当前 URL 编码成 query string 后跳转到 /acc-index/，
      由 index.html 里的解码脚本恢复成原 URL，再交给 react-router 处理。
      pathSegmentsToKeep = 1，因为这是部署在 /acc-index/ 子路径下。
      参考 https://github.com/rafgraph/spa-github-pages
    -->
    <script>
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
